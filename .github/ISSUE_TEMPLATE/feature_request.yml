name: Feature request
about: Suggest an improvement or new feature
title: "[FEATURE] "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: "Please provide a clear and concise description of the feature and why it's needed."
  - type: input
    id: summary
    attributes:
      label: Short summary
  - type: textarea
    id: motivation
    attributes:
      label: Motivation and background
      description: Why is this feature useful?
  - type: textarea
    id: scope
    attributes:
      label: Suggested implementation
      description: Describe how you would implement it or API changes
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Low
        - Medium
        - High
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this feature to be considered done?
