name: 'Welcome contributors'

on:
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new contributor
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const message = `Thanks @${author} for your contribution! A maintainer will review this PR soon. If you're new, please see the CONTRIBUTING guide and say hi in the comments. — _Ashish Parab_`;
            github.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: message });
